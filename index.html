 <!DOCTYPE html>
  <html>
  <head>
    <meta charset="utf-8">
    <title>UKG Health Check</title>
    <style>
      body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
  background: #f0f4f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .wrap { text-align: center; color: #374151; }
      .spinner { width: 40px; height: 40px; border: 4px solid #d1d5db; border-top-color: #1a7f4b;
  border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      p { margin: 0; font-size: 15px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <p>Opening health check...</p>
    </div>
    <script>
      var params = window.location.search;
      setTimeout(function() {
        window.location.href = 'ukghc://run' + params;
      }, 100);
    </script>
  </body>
  </html>
